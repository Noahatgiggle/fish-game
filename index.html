<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Fish Adventure 6.09</title>
<style>
body { margin:0; overflow:hidden; font-family:Arial; background:#001522; }
canvas { display:block; margin:auto; background:#003b5c; }

#ui {
    position:absolute; top:10px; left:10px;
    color:white; font-size:15px; font-weight:bold;
}

#shop {
    position:absolute; right:10px; top:10px;
    width:240px;
    background:rgba(0,0,0,0.75);
    color:white;
    padding:10px;
    display:none;
}
button { width:100%; margin-top:5px; }
</style>
</head>
<body>

<div id="ui">Press SPACE to Start</div>

<div id="shop">
<h3>🐟 Shop</h3>
<button onclick="buy('speed')">Speed Boost (30)</button>
<button onclick="buy('shield')">Shield (40)</button>
<button onclick="buy('heal')">Heal (25)</button>
<p>Press E to evolve fish</p>
</div>

<canvas id="game" width="900" height="500"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let started = false;

let score = 0;
let coins = 0;
let health = 5;

let camera = {x:0,y:0};

const worldSize = 3000;

const islands = [
    {name:"Coral Reef", color:"#00aaff", x:0},
    {name:"Deep Sea", color:"#001133", x:600},
    {name:"Ice Zone", color:"#99ddff", x:1200},
    {name:"Volcano", color:"#ff4400", x:1800},
    {name:"Mystery", color:"#5500aa", x:2400}
];

const fishStages = [
    {speed:4,size:18,color:"yellow"},
    {speed:5,size:22,color:"lime"},
    {speed:6,size:26,color:"cyan"},
    {speed:7,size:30,color:"white"}
];

let stage = 0;

const player = {x:100,y:200,shield:false};

let enemies = [];
let coinsOnMap = [];
let bosses = [];
let powerups = [];

const bossTypes = [
    {name:"Mega Shark", hp:25, speed:1.5, size:40, color:"purple"},
    {name:"Kraken", hp:40, speed:1, size:60, color:"darkred"},
    {name:"Ice Titan", hp:35, speed:1.2, size:50, color:"cyan"},
];

function spawnEnemy(){
    enemies.push({
        x:Math.random()*worldSize,
        y:Math.random()*500,
        speed:2+Math.random()*2
    });
}

function spawnCoin(){
    coinsOnMap.push({
        x:Math.random()*worldSize,
        y:Math.random()*500
    });
}

function spawnBoss(){
    let b = bossTypes[Math.floor(Math.random()*bossTypes.length)];
    bosses.push({
        x:camera.x+900,
        y:250,
        ...b,
        maxHp:b.hp
    });
}

function spawnPowerup(){
    powerups.push({
        x:Math.random()*worldSize,
        y:Math.random()*500,
        type:Math.random()<0.5?"speed":"shield"
    });
}

setInterval(spawnEnemy,1000);
setInterval(spawnCoin,1200);
setInterval(spawnPowerup,7000);
setInterval(()=>{ if(started) spawnBoss(); },12000);

const keys={};

window.addEventListener("keydown",e=>{
    keys[e.key]=true;

    if(e.key===" ") started=true;

    if(e.key==="s"||e.key==="S"){
        let s=document.getElementById("shop");
        s.style.display=s.style.display==="block"?"none":"block";
    }

    if(e.key==="e"||e.key==="E"){
        if(stage < fishStages.length-1 && coins>=50){
            coins-=50;
            stage++;
        }
    }
});

window.addEventListener("keyup",e=>keys[e.key]=false);

function update(){
    if(!started) return;

    let f = fishStages[stage];

    if(keys["ArrowUp"]) player.y-=f.speed;
    if(keys["ArrowDown"]) player.y+=f.speed;
    if(keys["ArrowLeft"]) player.x-=f.speed;
    if(keys["ArrowRight"]) player.x+=f.speed;

    // camera follows player
    camera.x = player.x - 450;

    // boundaries
    if(player.x<0) player.x=0;
    if(player.x>worldSize) player.x=worldSize;

    // coins
    coinsOnMap.forEach((c,i)=>{
        if(Math.hypot(player.x-c.x,player.y-c.y)<f.size){
            coins++;
            score++;
            coinsOnMap.splice(i,1);
        }
    });

    // enemies
    enemies.forEach((e,i)=>{
        if(Math.hypot(player.x-e.x,player.y-e.y)<f.size){
            if(!player.shield) health--;
            enemies.splice(i,1);
        }
    });

    // bosses
    bosses.forEach((b,i)=>{
        if(b.x>player.x) b.x-=b.speed;

        if(Math.hypot(player.x-b.x,player.y-b.y)<f.size+b.size/2){
            b.hp--;
            coins++;

            if(b.hp<=0){
                coins+=40;
                bosses.splice(i,1);
            }
        }
    });

    // powerups
    powerups.forEach((p,i)=>{
        if(Math.hypot(player.x-p.x,player.y-p.y)<f.size){
            if(p.type==="speed") {
                fishStages[stage].speed+=1;
            }
            if(p.type==="shield") {
                player.shield=true;
                setTimeout(()=>player.shield=false,5000);
            }
            powerups.splice(i,1);
        }
    });

    if(health<=0){
        alert("Game Over! Score: "+score);
        location.reload();
    }

    document.getElementById("ui").innerHTML=
    `🐟 Fish Adventure 6.09<br>
    Score: ${score} | Coins: ${coins} | Health: ${health}<br>
    Stage: ${stage+1}/4 | Shield: ${player.shield?"ON":"OFF"}`;
}

function draw(){
    ctx.clearRect(0,0,900,500);

    let f = fishStages[stage];

    // draw islands
    islands.forEach(i=>{
        ctx.fillStyle=i.color;
        ctx.fillRect(i.x-camera.x,0,600,500);

        ctx.fillStyle="white";
        ctx.font="16px Arial";
        ctx.fillText(i.name,i.x-camera.x+10,30);
    });

    // player
    ctx.fillStyle=f.color;
    ctx.beginPath();
    ctx.arc(player.x-camera.x,player.y,f.size,0,Math.PI*2);
    ctx.fill();

    // coins
    ctx.fillStyle="gold";
    coinsOnMap.forEach(c=>{
        ctx.beginPath();
        ctx.arc(c.x-camera.x,c.y,6,0,Math.PI*2);
        ctx.fill();
    });

    // enemies
    ctx.fillStyle="red";
    enemies.forEach(e=>{
        ctx.beginPath();
        ctx.arc(e.x-camera.x,e.y,12,0,Math.PI*2);
        ctx.fill();
    });

    // bosses
    bosses.forEach(b=>{
        ctx.fillStyle=b.color;
        ctx.beginPath();
        ctx.arc(b.x-camera.x,b.y,b.size,0,Math.PI*2);
        ctx.fill();

        // HP bar
        ctx.fillStyle="white";
        ctx.fillRect(b.x-camera.x-30,b.y-b.size-15,60,6);
        ctx.fillStyle="green";
        ctx.fillRect(b.x-camera.x-30,b.y-b.size-15,60*(b.hp/b.maxHp),6);
    });

    // powerups
    powerups.forEach(p=>{
        ctx.fillStyle=p.type==="speed"?"cyan":"blue";
        ctx.fillRect(p.x-camera.x,p.y,10,10);
    });

    if(!started){
        ctx.fillStyle="white";
        ctx.font="30px Arial";
        ctx.fillText("Press SPACE to Start",250,250);
    }
}

function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
