function gainXP(amount){

player.xp += amount;

if(
player.xp >=
player.level*100
){

player.xp = 0;

player.level++;

player.damage += 2;

player.maxHp += 10;

player.hp =
player.maxHp;

}

}

function buyItem(name,cost){

if(player.coins>=cost){

player.coins -= cost;

player.inventory.push(name);

}

}

function saveGame(){

localStorage.setItem(
"fishAdventure610",
JSON.stringify(player)
);

}

function loadGame(){

const data =
localStorage.getItem(
"fishAdventure610"
);

if(data){

player =
JSON.parse(data);

}

}

loadGame();

setInterval(

30000

},

},

{

name:"Boss Hunter",
goal:5,
progress:0,
reward:1000,
complete:false
}

];

function updateQuest(id, amount){

let q =
quests.find(
quest => quest.id === id
);

if(!q) return;

if(q.complete) return;

q.progress += amount;

if(q.progress >= q.goal){

q.complete = true;

player.coins += q.reward;

alert(
"Quest Complete: " +
q.name
);

}

}

const abilities = {

dash:{
damage:50,
cooldown:3000
},

bubbleBlast:{
damage:30,
cooldown:2000
},

electricShock:{
damage:100,
cooldown:5000
},

whirlpool:{
damage:150,
cooldown:8000
}

};

const lootTable = [

"Pearl",
"Ruby",
"Sapphire",
"Treasure Chest",
"Golden Scale",
"Boss Key",
"Ancient Relic"

];

function randomLoot(){

const loot =
lootTable[
Math.floor(
Math.random() *
lootTable.length
)
];

player.inventory.push(
loot
);

return loot;

}

const evolutions = {

"Goldfish":
"Golden Goldfish",

"Clownfish":
"Royal Clownfish",

"Blue Tang":
"Ocean Tang",

"Pufferfish":
"Titan Puffer",

"Angelfish":
"Celestial Angel"

};

function evolveFish(){

if(player.level < 10){

alert(
"Reach Level 10 first!"
);

return;

}

if(
evolutions[player.fish]
){

player.fish =
evolutions[player.fish];

player.damage += 15;
player.maxHp += 50;

alert(
player.fish +
" evolved!"
);

}

}

function spawnCoin(){

coins.push({

x:
Math.random() *
WORLD_WIDTH,

y:
Math.random() *
WORLD_HEIGHT,

value:1

});

}

function spawnEnemy(){

enemies.push({

x:
Math.random() *
WORLD_WIDTH,

y:
Math.random() *
WORLD_HEIGHT,

hp:
20 +
Math.random()*20,

damage:
5 +
Math.random()*5,

speed:
1 +
Math.random()*2

});

}

const bossTypes = [

{
name:"Shark King",
hp:500,
damage:15
},

{
name:"Kraken",
hp:1000,
damage:25
},

{
name:"Ice Titan",
hp:1500,
damage:35
},

{
name:"Lava Beast",
hp:1800,
damage:40
},

{
name:"Ghost Whale",
hp:2200,
damage:45
},

{
name:"Deep Sea Serpent",
hp:3000,
damage:50
},

{
name:"Storm Ray",
hp:3500,
damage:55
},

{
name:"Coral Guardian",
hp:4000,
damage:60
},

{
name:"Abyss Dragon",
hp:5000,
damage:75
},

{
name:"Ocean Emperor",
hp:10000,
damage:100
}

];

function spawnBoss(){

const template =

bossTypes[
Math.floor(
Math.random() *
bossTypes.length
)
];

bosses.push({

name:
template.name,

x:
player.x + 1000,

y:
player.y,

hp:
template.hp,

maxHp:
template.hp,

damage:
template.damage,

phase:1

});

}

function updateBossPhases(){

for(
let boss of bosses
){

if(
boss.hp <
boss.maxHp * 0.75
)
boss.phase = 2;

if(
boss.hp <
boss.maxHp * 0.50
)
boss.phase = 3;

if(
boss.hp <
boss.maxHp * 0.25
)
boss.phase = 4;

}

}

setInterval(
spawnCoin,
1000
);

setInterval(
spawnEnemy,
2000
);

setInterval(
spawnBoss,
20000
);

function useAbility(name){

if(
name==="dash"
){

player.x += 200;

}

if(
name==="bubbleBlast"
){

for(
let enemy of enemies
){

enemy.hp -=
abilities.bubbleBlast.damage;

}

}

if(
name==="electricShock"
){

for(
let enemy of enemies
){

enemy.hp -=
abilities.electricShock.damage;

}

}

if(
name==="whirlpool"
){

for(
let enemy of enemies
){

enemy.hp -=
abilities.whirlpool.damage;

}

for(
let boss of bosses
){

boss.hp -=
abilities.whirlpool.damage;

}

}

}const achievements = [

{
name:"First Coin",
unlocked:false
},

{
name:"Level 10",
unlocked:false
},

{
name:"Boss Hunter",
unlocked:false
},

{
name:"Master Explorer",
unlocked:false
},

{
name:"Ocean Legend",
unlocked:false
}

];

function unlockAchievement(name){

const achievement =
achievements.find(
a => a.name === name
);

if(
achievement &&
!achievement.unlocked
){

achievement.unlocked = true;

player.coins += 100;

alert(
"Achievement Unlocked: " +
name
);

}

}

const equipmentItems = [

{
name:"Golden Crown",
hp:100,
damage:0,
speed:0
},

{
name:"Titan Armor",
hp:250,
damage:0,
speed:-1
},

{
name:"Swift Fin",
hp:0,
damage:0,
speed:3
},

{
name:"Ancient Relic",
hp:0,
damage:50,
speed:0
}

];

function equipItem(itemName){

const item =
equipmentItems.find(
i => i.name === itemName
);

if(!item) return;

player.maxHp += item.hp;
player.hp += item.hp;
player.damage += item.damage;
player.speed += item.speed;

}

function travelToIsland(){

const index =
Math.floor(
player.x / 2000
);

if(
index >= 0 &&
index < islands.length
){

currentIsland =
islands[index];

}

}

function updateCamera(){

camera.x =
player.x -
(canvas.width/2);

camera.y =
player.y -
(canvas.height/2);

if(camera.x < 0)
camera.x = 0;

if(camera.y < 0)
camera.y = 0;

}

function movePlayer(){

if(keys["ArrowUp"])
player.y -= player.speed;

if(keys["ArrowDown"])
player.y += player.speed;

if(keys["ArrowLeft"])
player.x -= player.speed;

if(keys["ArrowRight"])
player.x += player.speed;

if(player.x < 0)
player.x = 0;

if(player.y < 0)
player.y = 0;

if(player.x > WORLD_WIDTH)
player.x = WORLD_WIDTH;

if(player.y > WORLD_HEIGHT)
player.y = WORLD_HEIGHT;

}

function collectCoins(){

for(
let i = coins.length-1;
i >= 0;
i--
){

const coin =
coins[i];

const dx =
player.x - coin.x;

const dy =
player.y - coin.y;

const distance =
Math.hypot(dx,dy);

if(distance < 30){

player.coins += coin.value;

coins.splice(i,1);

gainXP(5);

updateQuest(1,1);

if(player.coins === 1){

unlockAchievement(
"First Coin"
);

}

}

}

}

function enemyCombat(){

for(
let i = enemies.length-1;
i >= 0;
i--
){

const enemy =
enemies[i];

const dx =
player.x - enemy.x;

const dy =
player.y - enemy.y;

const distance =
Math.hypot(dx,dy);

if(distance < 40){

enemy.hp -=
player.damage;

player.hp -=
enemy.damage;

if(enemy.hp <= 0){

enemies.splice(i,1);

gainXP(25);

const loot =
randomLoot();

console.log(
"Enemy dropped:",
loot
);

}

}

}

}

function bossCombat(){

for(
let i = bosses.length-1;
i >= 0;
i--
){

const boss =
bosses[i];

const dx =
player.x - boss.x;

const dy =
player.y - boss.y;

const distance =
Math.hypot(dx,dy);

if(distance < 80){

boss.hp -=
player.damage;

player.hp -=
boss.damage;

if(
boss.hp <= 0
){

updateQuest(
3,
1
);

gainXP(250);

player.coins +=
500;

const loot =
randomLoot();

alert(
boss.name +
" defeated!\nLoot: " +
loot
);

bosses.splice(i,1);

unlockAchievement(
"Boss Hunter"
);

}

}

}

}

function checkLevels(){

if(
player.level >= 10
){

unlockAchievement(
"Level 10"
);

}

if(
player.level >= 100
){

unlockAchievement(
"Ocean Legend"
);

}

}

if(e.key === "3")
useAbility("electricShock");

if(e.key === "4")

}

for(

){

function drawEnemies(){

ctx.fillStyle = "red";

for(let enemy of enemies){

ctx.beginPath();

ctx.arc(
enemy.x - camera.x,
enemy.y - camera.y,
12,
0,
Math.PI * 2
);

ctx.fill();

}

}

function drawBosses(){

for(let boss of bosses){

ctx.fillStyle = "purple";

ctx.beginPath();

ctx.arc(
boss.x - camera.x,
boss.y - camera.y,
25,
0,
Math.PI * 2
);

ctx.fill();

ctx.fillStyle = "white";

ctx.fillRect(
boss.x - camera.x - 30,
boss.y - camera.y - 40,
60,
6
);

ctx.fillStyle = "lime";

ctx.fillRect(
boss.x - camera.x - 30,
boss.y - camera.y - 40,
60 * (boss.hp / boss.maxHp),
6
);

ctx.fillStyle = "white";

ctx.font = "12px Arial";

ctx.fillText(
boss.name,
boss.x - camera.x - 30,
boss.y - camera.y - 50
);

}

}

function drawPlayer(){

ctx.fillStyle = "yellow";

ctx.beginPath();

ctx.arc(
player.x - camera.x,
player.y - camera.y,
18,
0,
Math.PI * 2
);

ctx.fill();

if(player.shield){

ctx.strokeStyle = "cyan";
ctx.lineWidth = 3;

ctx.beginPath();

ctx.arc(
player.x - camera.x,
player.y - camera.y,
25,
0,
Math.PI * 2
);

ctx.stroke();

}

}

function updateUI(){

document.getElementById("ui").innerHTML =

"🐟 Fish Adventure 6.10 Ultimate<br>" +

"HP: " + player.hp +

"Coins: " + player.coins + "<br>" +
"Fish: " + player.fish + "<br>" +
"Island: " + currentIsland + "<br>" +
"Inventory: " +
player.inventory.length +
" items";

}

function updateGame(){

movePlayer();

updateCamera();

travelToIsland();

collectCoins();

enemyCombat();

bossCombat();

updateBossPhases();

checkLevels();

if(player.hp <= 0){

alert(
"Game Over!\nLevel: " +
player.level +
"\nCoins: " +
player.coins
);

location.reload();

}

}

function render(){

drawWorld();

drawCoins();

drawEnemies();

drawBosses();

drawPlayer();

updateUI();

}

function gameLoop(){

updateGame();

render();

requestAnimationFrame(
gameLoop
);

}

gameLoop();
